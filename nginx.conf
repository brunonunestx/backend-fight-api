events {
    worker_connections 1024;
}

http {
    upstream api {
        server api1:3000;
        server api2:3000;
        keepalive 32;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
